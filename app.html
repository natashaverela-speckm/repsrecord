<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepsRecord — REPS & STR Hour Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#F0FDFA;color:#0D1F3C;}
.app{display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ── */
.sb{width:204px;flex-shrink:0;background:#0D1F3C;display:flex;flex-direction:column;}
.sb-head{padding:18px 18px 10px;}
.sb-logo{font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.04em;}
.sb-logo span{color:#14B8A6;}
.sb-signout{width:100%;margin-top:8px;padding:9px 12px;background:#0F2D4A;border:1px solid #38BDF8;color:#38BDF8;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border-radius:8px;transition:all .15s;text-align:center;}
.sb-signout:hover{background:#EF4444;border-color:#EF4444;color:#fff;}
.sb-yr{font-size:10px;color:#7DD3FC;margin-top:3px;letter-spacing:.03em;}
.sb-nav{padding:0 8px;flex:1;}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;margin-bottom:2px;cursor:pointer;font-size:13px;color:#7DD3FC;transition:background .1s;user-select:none;}
.ni.active{background:#14B8A622;color:#14B8A6;font-weight:700;}
.ni:hover:not(.active){background:#ffffff0d;}
.ni-ic{font-size:15px;width:20px;text-align:center;}
.sb-foot{margin:10px;padding:13px 14px;background:#0F2D4A;border-radius:10px;}
.sf-lbl{font-size:9px;color:#7DD3FC;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.sf-val{font-size:13px;font-weight:700;color:#fff;margin-bottom:8px;}
.sf-track{height:4px;background:#1E4A6E;border-radius:99px;}
.sf-fill{height:4px;background:#14B8A6;border-radius:99px;transition:width .5s ease;}

/* ── Main ── */
.main{flex:1;overflow-y:auto;background:#F0FDFA;}
.content{padding:28px 32px 48px;max-width:920px;}
.ph{margin-bottom:22px;}
.ph-row{display:flex;justify-content:space-between;align-items:flex-start;}
.pg-title{font-size:22px;font-weight:900;letter-spacing:-0.03em;color:#0D1F3C;}
.pg-sub{font-size:13px;color:#64748B;margin-top:4px;}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748B;margin-bottom:8px;}

/* ── Cards ── */
.card{background:#fff;border:.5px solid #CCFBF1;border-radius:12px;padding:18px;}
.card-mb{margin-bottom:14px;}

/* ── Grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g-str{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}

/* ── Ring cards ── */
.rc{display:flex;align-items:center;gap:16px;}
.rw{position:relative;flex-shrink:0;}
.rctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.rn{font-size:19px;font-weight:900;color:#0D1F3C;line-height:1;letter-spacing:-0.03em;}
.rd{font-size:10px;color:#64748B;}
.rl{font-size:14px;font-weight:700;color:#0D1F3C;margin-bottom:5px;}
.rs{font-size:12px;color:#64748B;line-height:1.5;margin-bottom:8px;}

/* ── Badges ── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.03em;}
.b-met{background:#D1FAE5;color:#065F46;}
.b-warn{background:#CFFAFE;color:#0E7490;}
.b-no{background:#FEE2E2;color:#991B1B;}
.b-blue{background:#EFF6FF;color:#1E40AF;}
.b-amber{background:#FEF3C7;color:#92400E;}

/* ── Banners ── */
.banner{border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.bn-teal{background:#CFFAFE;border:.5px solid #99F6E4;}
.bn-green{background:#ECFDF5;border:.5px solid #6EE7B7;}
.bn-ic{font-size:24px;flex-shrink:0;}
.bn-title{font-size:14px;font-weight:700;color:#0D1F3C;margin-bottom:3px;}
.bn-sub{font-size:12px;color:#64748B;line-height:1.5;}

/* ── STR cards ── */
.str-c{background:#fff;border:.5px solid #CCFBF1;border-radius:12px;padding:14px;border-top:3px solid #14B8A6;}
.str-c.unmet{border-top-color:#F59E0B;}
.str-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.str-nm{font-size:14px;font-weight:700;color:#0D1F3C;}
.str-mt{font-size:11px;color:#64748B;margin-top:2px;}
.str-big{font-size:28px;font-weight:900;color:#0D1F3C;line-height:1;}
.str-big span{font-size:13px;font-weight:400;color:#64748B;}
.tcs{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}
.tc{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:600;}
.tc-y{background:#D1FAE5;color:#065F46;}
.tc-n{background:#F0FDFA;color:#64748B;border:.5px solid #CCFBF1;}

/* ── Chart ── */
.chart-wrap{position:relative;height:180px;}

/* ── Buttons ── */
.btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-teal{background:#14B8A6;color:#fff;}
.btn-blue{background:#38BDF8;color:#fff;}
.btn-outline{background:#fff;color:#0D1F3C;border:.5px solid #CCFBF1;}
.btn-danger{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;}
.btn-danger:hover{background:#EF4444;color:#fff;border-color:#EF4444;}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px;}
.btn-block{width:100%;padding:12px;border-radius:10px;font-size:14px;}

/* ── Forms ── */
.field{margin-bottom:14px;}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748B;margin-bottom:6px;display:block;}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border-radius:8px;border:1.5px solid #CBD5E1;font-size:13px;font-family:inherit;color:#0D1F3C;background:#F8FAFC;outline:none;transition:border-color .15s,box-shadow .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#14B8A6;box-shadow:0 0 0 3px #14B8A620;background:#fff;}
.field input::placeholder,.field textarea::placeholder{color:#94A3B8;}
.field textarea{resize:vertical;min-height:80px;}
.hint{font-size:11px;color:#64748B;margin-top:5px;line-height:1.5;}
.info-box{font-size:12px;padding:10px 14px;border-radius:8px;margin-bottom:14px;line-height:1.6;}
.ib-teal{background:#F0FDFA;color:#0F766E;border:.5px solid #99F6E4;}
.ib-blue{background:#E0F7FA;color:#0369A1;border:.5px solid #BAE6FD;}
.tog-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;cursor:pointer;}
.tog-row input[type=checkbox]{width:18px;height:18px;accent-color:#14B8A6;cursor:pointer;}
.tog-lbl{font-size:13px;font-weight:600;color:#0D1F3C;}

/* ── Track toggle ── */
.track-bar{display:flex;gap:6px;padding:4px;background:#F0FDFA;border-radius:10px;margin-bottom:18px;}
.track-btn{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;color:#64748B;background:transparent;transition:all .15s;}
.track-btn.active-reps{background:#14B8A6;color:#fff;}
.track-btn.active-str{background:#38BDF8;color:#fff;}

/* ── Entries ── */
.ei{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:.5px solid #F0FDFA;}
.ei:last-child{border-bottom:none;}
.ei-ic{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.ei-cat{font-size:13px;font-weight:700;color:#0D1F3C;}
.ei-meta{font-size:11px;color:#64748B;margin-top:2px;}
.ei-note{font-size:11px;color:#94A3B8;margin-top:3px;font-style:italic;}
.ei-hrs{font-size:13px;font-weight:800;color:#0D1F3C;margin-left:auto;flex-shrink:0;padding-top:2px;}
.ei-del{background:#FEE2E2;border:1px solid #FECACA;cursor:pointer;color:#DC2626;font-size:14px;padding:4px 8px;border-radius:6px;flex-shrink:0;transition:all .1s;}
.ei-del:hover{color:#fff;background:#EF4444;border-color:#EF4444;}
.upload-zone{border:1.5px dashed #CCFBF1;border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all .15s;background:#F0FDFA;margin-bottom:12px;}
.upload-zone:hover{border-color:#14B8A6;background:#CFFAFE;}
.upload-zone input[type=file]{display:none;}
.upload-zone-label{font-size:12px;color:#0E7490;font-weight:600;cursor:pointer;}
.attach-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.attach-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:99px;background:#F0FDFA;border:1px solid #99F6E4;font-size:11px;color:#0E7490;font-weight:600;}
.attach-chip a{color:#0E7490;text-decoration:none;}
.attach-chip button{background:none;border:none;cursor:pointer;color:#94A3B8;font-size:12px;line-height:1;padding:0;}
.attach-chip button:hover{color:#EF4444;}
.attach-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;background:#CFFAFE;color:#0E7490;margin-left:6px;}
.tb{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;}
.tb-r{background:#F0FDFA;color:#0E7490;}
.tb-s{background:#E0F7FA;color:#0369A1;}
.tb-sp{background:#EFF6FF;color:#1E40AF;}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 0 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#64748B;border-bottom:1.5px solid #CCFBF1;}
td{padding:9px 0;border-bottom:.5px solid #F0FDFA;color:#0D1F3C;vertical-align:middle;}
tr:last-child td{border-bottom:none;}

/* ── Property cards ── */
.prop-c{background:#fff;border:.5px solid #CCFBF1;border-radius:12px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-start;border-left:4px solid #14B8A6;}
.prop-c.ltr{border-left-color:#38BDF8;}
.prop-nm{font-size:15px;font-weight:700;color:#0D1F3C;}
.prop-addr{font-size:12px;color:#64748B;margin-top:2px;}
.prop-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;}

/* ── MP tests ── */
.mp-row{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:.5px solid #F0FDFA;}
.mp-row:last-child{border-bottom:none;}
.mp-num{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.mp-num.met{background:#D1FAE5;color:#065F46;}
.mp-num.unm{background:#F0FDFA;color:#94A3B8;border:.5px solid #CCFBF1;}
.mp-name{font-size:13px;font-weight:700;color:#0D1F3C;margin-bottom:3px;}
.mp-cite{font-size:10px;color:#94A3B8;font-family:ui-monospace,monospace;margin-bottom:4px;}
.mp-desc{font-size:12px;color:#64748B;line-height:1.5;}
.mp-man{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;font-weight:600;color:#0D1F3C;cursor:pointer;}
.mp-man input{accent-color:#14B8A6;width:15px;height:15px;}

/* ── Report stats ── */
.rstat{text-align:center;padding:16px;background:#fff;border-radius:10px;border:.5px solid #CCFBF1;}
.rstat-num{font-size:28px;font-weight:900;color:#14B8A6;letter-spacing:-0.03em;}
.rstat-lbl{font-size:11px;color:#64748B;margin-top:2px;}
.rstat-req{font-size:10px;color:#94A3B8;}

/* ── Empty states ── */
.empty{text-align:center;padding:48px 0;color:#94A3B8;}
.empty-ic{font-size:44px;margin-bottom:14px;}
.empty-tx{font-size:14px;}

/* ── Print ── */
@media print{.sb,.top-acts{display:none!important;}.main{overflow:visible;}.app{height:auto;overflow:visible;}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#CCFBF1;border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="sb">
    <div class="sb-head">
      <div class="sb-logo">REPS<span>Record</span></div>
      <select id="year-sel" onchange="activeYear=parseInt(this.value);renderView()" style="font-size:10px;color:#7DD3FC;background:transparent;border:none;outline:none;cursor:pointer;font-family:inherit;font-weight:700;letter-spacing:.03em;margin-top:3px;"></select>
    </div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-foot">
      <div class="sf-lbl">REPS Status</div>
      <div class="sf-val" id="sb-val">0 / 750 hrs</div>
      <div class="sf-track"><div class="sf-fill" id="sb-fill" style="width:0%"></div></div>
      <div style="height:.5px;background:#1E4A6E;margin:10px 0;"></div>
      <div class="sf-lbl">STR Hours</div>
      <div class="sf-val" id="sb-str-val">0 hrs logged</div>
      <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;" id="sb-str-props"></div>
      <div style="height:.5px;background:#1E4A6E;margin:10px 0;"></div>
      <button onclick="signOut()" class="sb-signout">🚪 Sign out</button>
    </div>
  </div>
  <div class="main"><div class="content" id="content"></div></div>
</div>

<script>
const SK='repsrecord_v1';
const CUR_YEAR=new Date().getFullYear();
const YEARS=[CUR_YEAR-3,CUR_YEAR-2,CUR_YEAR-1,CUR_YEAR];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const REPS_CATS=['— General REPS Hours (Real Estate Professional Activity)','Acquisition & Due Diligence','Property Management','Leasing & Marketing','Maintenance & Repairs','Construction & Development','Financial & Accounting','Legal & Compliance','Tenant Communication','Contractor Coordination','Education & Research (RE-related)','Travel (property-related)','Property Selling','Other Qualifying Activity'];
const STR_CATS=['— Material Participation Hours (STR Active Management)','Guest Communication','Booking & Reservation Management','Check-in / Check-out','Cleaning Coordination','Maintenance & Repairs','Marketing & Listing Management','Financial & Accounting','Furnishing & Setup','Travel (STR property)','Guest Services & Concierge','Other STR Activity'];
const NAV=[{id:'dashboard',ic:'📊',label:'Dashboard'},{id:'properties',ic:'🏠',label:'Properties'},{id:'log',ic:'⏱',label:'Log Time'},{id:'mp',ic:'✅',label:'MP Tests'},{id:'reports',ic:'📋',label:'Audit Report'},{id:'divider'},{id:'ltr',ic:'🏡',label:'REPS Rules'},{id:'str',ic:'🏖',label:'STR Rules'},{id:'settings',ic:'⚙️',label:'Settings'}];

let state={settings:{nonREPSHours:0,spouseEnabled:false,spouseName:'',groupingElection:false,includeSTRinREPS:true},properties:[],entries:[],manualMP:{}};
let activeYear=CUR_YEAR;
let view='dashboard',chartInst=null,showPropForm=false,trackType='REPS';

function uid(){return Math.random().toString(36).slice(2,9);}
function fmtH(h){const a=Math.floor(h),b=Math.round((h-a)*60);return b===0?`${a}h`:`${a}h ${b}m`;}
function todayStr(){return new Date().toISOString().slice(0,10);}

async function signOut(){
  const SUPABASE_URL='https://ehuttijifubonhhgnvzx.supabase.co';
  const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVodXR0aWppZnVib25oaGdudnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjU2MTgsImV4cCI6MjA5NTA0MTYxOH0.-uYE8sxRDXdZXt00CH10d7tLYaJl03hFYfDH5tPjTKM';
  await fetch(`${SUPABASE_URL}/auth/v1/logout`,{method:'POST',headers:{'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'apikey':SUPABASE_ANON_KEY}});
  window.location.href='login.html';
}

function load(){
  try{
    const s=localStorage.getItem(SK);
    if(s){
      state=JSON.parse(s);
      // Migrate: ensure all properties have bookings array (backward compat)
      if(state.properties){
        state.properties.forEach(p=>{
          if(!p.bookings)p.bookings=[];
        });
      }
      // Migrate: ensure manualMP exists
      if(!state.manualMP)state.manualMP={};
    }
  }catch(e){}
}
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}

function yearEntries(){return state.entries.filter(e=>e.date&&e.date.startsWith(String(activeYear)));}

function calcREPS(){
  const inc=state.settings.includeSTRinREPS!==false;
  const ye=yearEntries();
  const propIds=new Set(state.properties.map(p=>p.id));
  // Count entries where property still exists OR propertyId is null (kept after deletion)
  const rh=ye.filter(e=>!e.isSpouse&&(propIds.has(e.propertyId)||e.propertyId===null||e.propertyId===undefined||e.propertyId==='')&&(e.trackType==='REPS'||e.trackType==='LTR'||(inc&&e.trackType==='STR'))).reduce((s,e)=>s+(e.hours||0),0);
  const th=rh+(state.settings.nonREPSHours||0);
  const pct=th>0?rh/th*100:0;
  return{rh,pct,m750:rh>750,m50:pct>50,ok:rh>750&&pct>50};
}

function pH(pid){
  return{owner:state.entries.filter(e=>e.propertyId===pid&&!e.isSpouse).reduce((s,e)=>s+e.hours,0),
         spouse:state.entries.filter(e=>e.propertyId===pid&&e.isSpouse).reduce((s,e)=>s+e.hours,0)};
}

function mpT(pid){
  const ph=pH(pid),p=state.properties.find(x=>x.id===pid)||{},mo=Math.max(ph.spouse||0,p.otherHours||0),mn=(state.manualMP||{})[pid]||{};
  return[
    {id:1,name:'Test 1',label:'500 Hours',cite:'§1.469-5T(a)(1)',desc:'500+ hours in this activity during the year.',auto:true,met:ph.owner>=500},
    {id:2,name:'Test 2',label:'Substantially All',cite:'§1.469-5T(a)(2)',desc:'Substantially all participation was yours (others participated less than 10%).',auto:false,met:!!mn[2]},
    {id:3,name:'Test 3',label:'100 Hrs + Primary',cite:'§1.469-5T(a)(3)',desc:'100+ hours AND more than any other individual participant.',auto:true,met:ph.owner>=100&&ph.owner>mo},
    {id:4,name:'Test 4',label:'SPA Aggregate',cite:'§1.469-5T(a)(4)',desc:'Each qualifying activity requires 100–499 hrs (Significant Participation Activity threshold); all your SPAs must aggregate to 500+ hours total for the year.',auto:false,met:!!mn[4]},
    {id:5,name:'Test 5',label:'5 of Last 10 Yrs',cite:'§1.469-5T(a)(5)',desc:'Materially participated in this activity in any 5 of the last 10 taxable years.',auto:false,met:!!mn[5]},
    {id:6,name:'Test 6',label:'3 Prior Yrs (Svc)',cite:'§1.469-5T(a)(6)',desc:'Materially participated 3 prior years when the activity was a personal service activity. Does not apply to most STRs — STR properties are almost never personal service activities (medical, law, engineering, etc.).',auto:false,met:!!mn[6]},
    {id:7,name:'Test 7',label:'Facts & Circumstances',cite:'§1.469-5T(a)(7)',desc:'Participate on a regular, continuous, and substantial basis (facts & circumstances). IRS commonly requires 100+ hours in practice, but no fixed minimum is in the regulation.',auto:true,met:ph.owner>=100&&ph.owner>mo},
  ];
}

// ── Nav ──
function renderNav(){
  document.getElementById('sb-nav').innerHTML=NAV.map(n=>{
    if(n.id==='divider') return `<div style="height:.5px;background:#1E3A5F;margin:8px 10px;"></div>`;
    return `<div class="ni${view===n.id?' active':''}" onclick="go('${n.id}')"><span class="ni-ic">${n.ic}</span>${n.label}</div>`;
  }).join('');
}
function updateSB(){
  const r=calcREPS(),pct=Math.min(r.rh/750*100,100);
  document.getElementById('sb-val').textContent=r.ok?'✓ Qualified!':`${Math.round(r.rh)} / 751 hrs min`;
  document.getElementById('sb-val').style.color=r.ok?'#14B8A6':'#fff';
  document.getElementById('sb-fill').style.width=pct+'%';
  document.getElementById('sb-fill').style.background=r.ok?'#10B981':'#14B8A6';
  // STR sidebar
  const strHrs=state.entries.filter(e=>!e.isSpouse&&e.trackType==='STR').reduce((s,e)=>s+(e.hours||0),0);
  const strPs=state.properties.filter(p=>p.type==='STR');
  const strQual=strPs.filter(p=>{const ph=pH(p.id);return mpT(p.id).some(t=>t.met);});
  const strEl=document.getElementById('sb-str-val');
  const strPropsEl=document.getElementById('sb-str-props');
  if(strEl) strEl.textContent=strPs.length?`${Math.round(strHrs)} hrs · ${strQual.length}/${strPs.length} MP met`:`${Math.round(strHrs)} hrs logged`;
  if(strEl) strEl.style.color=strPs.length&&strQual.length===strPs.length&&strPs.length>0?'#14B8A6':'#fff';
  if(strPropsEl) strPropsEl.innerHTML=strPs.map(p=>{
    const any=mpT(p.id).some(t=>t.met);

// ── SVG ring helper ──
function svgRing(val,max,color,bg,sz=110,sw=10){
  const r=(sz-sw)/2,c=2*Math.PI*r,off=c*(1-Math.min(val/max,1));
  return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg);display:block;"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${bg}" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" stroke-linecap="round"/></svg>`;
}

// ── UPLOAD TO SUPABASE STORAGE ──
async function uploadFiles(entryId,files){
  const SUPABASE_URL='https://ehuttijifubonhhgnvzx.supabase.co';
  const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVodXR0aWppZnVib25oaGdudnp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjU2MTgsImV4cCI6MjA5NTA0MTYxOH0.-uYE8sxRDXdZXt00CH10d7tLYaJl03hFYfDH5tPjTKM';
  const attachments=[];
  for(const file of files){
    const path=`${entryId}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const res=await fetch(`${SUPABASE_URL}/storage/v1/object/evidence/${path}`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},
      body:file
    });
    if(res.ok){
      const url=`${SUPABASE_URL}/storage/v1/object/public/evidence/${path}`;
      attachments.push({name:file.name,url,path});
    }
  }
  return attachments;
}

async function submitEntry(){
  const h=(parseFloat(document.getElementById('f-hrs')?.value)||0)+(parseInt(document.getElementById('f-mins')?.value)||0)/60;
  if(h<=0){alert('Please enter a time greater than 0.');return;}
  const propId=document.getElementById('f-prop')?.value;
  if(!propId){alert('Please select a property.\n\nGo to Properties in the menu to add your properties first.');return;}
  const btn=document.getElementById('sub-btn');
  if(btn){btn.disabled=true;btn.textContent=pendingFiles.length?'⬆ Uploading files…':'Saving…';}
  const cat=document.getElementById('f-cat')?.value||(trackType==='STR'?STR_CATS[0]:REPS_CATS[0]);
  const entryId=uid();
  let attachments=[];
  if(pendingFiles.length>0){
    try{attachments=await uploadFiles(entryId,pendingFiles);}
    catch(err){console.error('Upload error:',err);}
  }
  state.entries.push({id:entryId,date:document.getElementById('f-date')?.value||todayStr(),propertyId:propId,trackType,type:trackType,category:cat,hours:Math.round(h*100)/100,notes:document.getElementById('f-notes')?.value||'',isSpouse:!!document.getElementById('f-spouse')?.checked,attachments});
  save();
  pendingFiles=[];
  if(btn){btn.textContent='✓ Saved!';btn.style.background='#10B981';}
  setTimeout(()=>renderView(),1200);
}

function delEntry(id){if(!confirm('Delete this entry?'))return;state.entries=state.entries.filter(e=>e.id!==id);save();renderView();}

function showEditEntry(id){
  const el=document.getElementById('edit-entry-'+id);
  if(!el)return;
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
}

function saveEditEntry(id){
  const entry=state.entries.find(e=>e.id===id);
  if(!entry)return;
  const hrs=parseFloat(document.getElementById('ee-hrs-'+id)?.value)||0;
  const mins=parseFloat(document.getElementById('ee-min-'+id)?.value)||0;
  entry.date=document.getElementById('ee-date-'+id)?.value||entry.date;
  entry.hours=hrs+(mins/60);
  entry.category=document.getElementById('ee-cat-'+id)?.value||entry.category;
  entry.notes=document.getElementById('ee-note-'+id)?.value||'';
  save();renderView();
}

function delAttachment(entryId,name){
  const entry=state.entries.find(e=>e.id===entryId);
  if(!entry)return;
  entry.attachments=(entry.attachments||[]).filter(a=>a.name!==name);
  save();renderView();
}

let addrTimer=null;
function addrSearch(q){
  clearTimeout(addrTimer);
  const box=document.getElementById('p-addr-suggestions');
  if(!q||q.length<4){if(box)box.style.display='none';return;}
  addrTimer=setTimeout(async()=>{
    try{
      const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&countrycodes=us&format=json&addressdetails=1&limit=5`,{headers:{'Accept-Language':'en'}});
      const data=await res.json();
      if(!box)return;
      if(!data.length){box.style.display='none';return;}
      box.innerHTML=data.map((r,i)=>`<div onclick="fillAddr(${i})" data-addr='${JSON.stringify({street:(r.address.house_number?r.address.house_number+' ':'')+( r.address.road||r.address.pedestrian||''),city:r.address.city||r.address.town||r.address.village||r.address.county||'',state:r.address.state||'',zip:r.address.postcode||''}).replace(/'/g,"&apos;")}' style="padding:10px 14px;cursor:pointer;font-size:13px;color:#0D1F3C;border-bottom:1px solid #F0FDFA;" onmouseover="this.style.background='#F0FDFA'" onmouseout="this.style.background=''">${r.display_name}</div>`).join('');
      box.style.display='block';
    }catch(e){if(box)box.style.display='none';}
  },400);
}
function fillAddr(i){
  const box=document.getElementById('p-addr-suggestions');
  const items=box?.querySelectorAll('[data-addr]');
  if(!items||!items[i])return;
  const a=JSON.parse(items[i].getAttribute('data-addr').replace(/&apos;/g,"'"));
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val;};
  set('p-street',a.street);
  set('p-city',a.city);
  set('p-state',a.state.length>2?a.state.substring(0,2).toUpperCase():a.state.toUpperCase());
  set('p-zip',a.zip);
  set('p-addr-search',a.street+(a.city?', '+a.city:'')+(a.state?', '+a.state:''));
  box.style.display='none';
}

async function handleImportFile(input){
  const file = input.files[0];
  if(!file) return;
  const status = document.getElementById('import-status');
  status.style.display='block';
  status.innerHTML = '<div style="color:#64748B;font-size:13px;">⏳ Reading file...</div>';

  try {
    let rows = [];
    if(file.name.endsWith('.csv')){
      const text = await file.text();
      rows = parseCSV(text);
    } else {
      // Load SheetJS from CDN
      if(!window.XLSX){
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
          s.onload=res; s.onerror=rej;
          document.head.appendChild(s);
        });
      }
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {defval:''});
      rows = data;
    }

    // Validate and map rows
    const required = ['date','hours','property','type'];
    const sample = rows[0] ? Object.keys(rows[0]).map(k=>k.toLowerCase()) : [];
    const missing = required.filter(r => !sample.includes(r));
    if(missing.length){
      status.innerHTML = `<div style="background:#FEE2E2;border-radius:8px;padding:12px;font-size:13px;color:#991B1B;">❌ Missing required columns: <strong>${missing.join(', ')}</strong><br>Check your column headers match exactly.</div>`;
      return;
    }

    // Normalize keys to lowercase
    const normalized = rows.map(r => {
      const obj = {};
      Object.keys(r).forEach(k => obj[k.toLowerCase().trim()] = String(r[k]).trim());
      return obj;
    }).filter(r => r.date && r.hours && r.property);

    // Match properties
    let matched=0, unmatched=[], entries=[];
    normalized.forEach(r => {
      const prop = state.properties.find(p => p.name.toLowerCase() === r.property.toLowerCase());
      const hrs = parseFloat(r.hours)||0;
      const mins = parseFloat(r.minutes||0);
      const total = Math.round((hrs + mins/60)*100)/100;
      const tt = (r.type||'REPS').toUpperCase() === 'STR' ? 'STR' : 'REPS';
      const cats = tt==='STR' ? STR_CATS : REPS_CATS;
      const cat = cats.find(c=>c.toLowerCase()===( r.category||'').toLowerCase()) || cats[0];
      if(!prop){ unmatched.push(r.property); return; }
      if(total <= 0) return;
      entries.push({
        id: uid(),
        date: r.date,
        propertyId: prop.id,
        trackType: tt,
        type: tt,
        category: cat,
        hours: total,
        notes: r.notes||'',
        isSpouse: false,
        attachments: []
      });
      matched++;
    });

    _importRows = entries;
    const unmatchedUniq = [...new Set(unmatched)];
    let html = `<div style="background:#F0FDFA;border-radius:8px;padding:14px;font-size:13px;color:#0E7490;">
      ✅ <strong>${matched} entries</strong> ready to import`;
    if(unmatchedUniq.length){
      html += `<br><span style="color:#B45309;">⚠️ ${unmatched.length} rows skipped — property not found: <strong>${unmatchedUniq.join(', ')}</strong></span>`;
    }
    html += '</div>';
    status.innerHTML = html;

    const btn = document.getElementById('import-confirm-btn');
    if(btn) btn.style.display = matched > 0 ? 'inline-block' : 'none';

  } catch(err){
    status.innerHTML = `<div style="background:#FEE2E2;border-radius:8px;padding:12px;font-size:13px;color:#991B1B;">❌ Error reading file: ${err.message}</div>`;
  }
}

function parseCSV(text){
  const lines = text.split('\n').filter(l=>l.trim());
  if(lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map(line=>{
    const vals = line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
    const obj = {};
    headers.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  });
}

}

// ── BOOKING LOG ──
function calcAvgFromBookings(pid){
  const p=state.properties.find(x=>x.id===pid);
  if(!p||!p.bookings||!p.bookings.length)return null;
  const total=p.bookings.reduce((s,b)=>{
    const nights=Math.round((new Date(b.checkOut)-new Date(b.checkIn))/(1000*60*60*24));
    return s+(nights>0?nights:0);
  },0);
  return total>0?Math.round((total/p.bookings.length)*10)/10:null;
}
function toggleBookingLog(pid){
  const el=document.getElementById('booking-log-'+pid);
  if(!el)return;
  el.style.display=el.style.display==='none'?'block':'none';
}
function addBooking(pid){
  const cin=document.getElementById('bk-in-'+pid)?.value;
  const cout=document.getElementById('bk-out-'+pid)?.value;
  if(!cin||!cout){alert('Please enter both check-in and check-out dates.');return;}
  if(new Date(cout)<=new Date(cin)){alert('Check-out must be after check-in.');return;}
  const p=state.properties.find(x=>x.id===pid);
  if(!p)return;
  if(!p.bookings)p.bookings=[];
  p.bookings.push({id:uid(),checkIn:cin,checkOut:cout});
  // Auto-update avgRentalDays from bookings
  const avg=calcAvgFromBookings(pid);
  if(avg!==null)p.avgRentalDays=avg;
  save();renderView();
}
function delBooking(pid,bid){
  const p=state.properties.find(x=>x.id===pid);
  if(!p)return;
  p.bookings=(p.bookings||[]).filter(b=>b.id!==bid);
  const avg=calcAvgFromBookings(pid);
  if(avg!==null)p.avgRentalDays=avg;
  save();renderView();
}

// ── STR RULES ──
function vSTR(){
  return`
<div class="ph"><div class="pg-title">STR Rules — Short-Term Rental Material Participation Exception</div><div class="pg-sub">IRC §469 · Temp. Reg. §1.469-5T · How short-term rentals escape the passive loss rules</div></div>
<div class="banner bn-teal" style="margin-bottom:16px;"><div class="bn-ic">🔑</div><div><div class="bn-title">Why the STR material participation exception is powerful</div><div class="bn-sub">Short-term rentals are NOT automatically rental activities under §469 if the average rental period is 7 days or fewer. This means they are subject to material participation rules — and losses can be non-passive without REPS status, making this available to anyone.</div></div></div>

<div class="sec-lbl">Step 1 — Average Rental Period Test</div>
<div class="card card-mb">
  <div style="font-size:15px;font-weight:800;color:#0D1F3C;margin-bottom:8px;">Temp. Reg. §1.469-1T(e)(3)(ii)</div>
  <div style="font-size:13px;color:#64748B;line-height:1.7;margin-bottom:14px;">An activity is NOT treated as a rental activity if the average period of customer use is 7 days or fewer. Calculated as total rental days ÷ number of separate rental transactions in the year.</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">
    ${[['≤ 7 days','STR Material Participation Exception Applies','Not a rental activity — MP tests govern. Most powerful scenario. (§1.469-1T(e)(3)(ii)(A)(1))','#ECFDF5','#6EE7B7','#065F46'],['8–30 days','May Still Qualify','Must provide significant personal services — higher scrutiny. (§1.469-1T(e)(3)(ii)(A)(2))','#FFFBEB','#FDE68A','#92400E'],['> 30 days','Standard Rental Rules','Subject to passive loss rules. Needs REPS for non-passive treatment.','#FEF2F2','#FECACA','#991B1B']].map(([r,t,d,bg,br,tc])=>`<div style="padding:14px;background:${bg};border-radius:10px;border:.5px solid ${br};text-align:center;"><div style="font-size:20px;font-weight:900;color:${tc};margin-bottom:4px;">${r}</div><div style="font-size:12px;font-weight:700;color:#0D1F3C;margin-bottom:6px;">${t}</div><div style="font-size:11px;color:#64748B;line-height:1.5;">${d}</div></div>`).join('')}
  </div>
  <div style="padding:11px 14px;background:#EFF6FF;border-radius:8px;border:.5px solid #BFDBFE;margin-bottom:10px;">
    <div style="font-size:12px;font-weight:700;color:#1E40AF;margin-bottom:4px;">💡 Extraordinary personal services exception</div>
    <div style="font-size:12px;color:#1E40AF;line-height:1.7;">Even without meeting the ≤7-day or 8–30-day average rental period tests, an activity is NOT treated as a rental if extraordinary personal services are provided by or on behalf of the owner (§1.469-1T(e)(3)(ii)(B)). This exception applies regardless of average rental period — consult your tax professional.</div>
  </div>
  <div style="padding:12px 14px;background:#CFFAFE;border-radius:8px;border:.5px solid #99F6E4;">
    <div style="font-size:12px;font-weight:700;color:#0E7490;margin-bottom:4px;">📐 How to calculate average rental period</div>
    <div style="font-size:12px;color:#0D1F3C;line-height:1.7;">Total all rental days for the year, then divide by the number of separate bookings. Example: 3 bookings of 4, 5, and 6 days = 15 days ÷ 3 = <strong>5.0 day average ✓</strong>. Track each booking individually in your records — do not rely solely on platform reports.</div>
  </div>
</div>

<div class="sec-lbl">Step 2 — Material Participation (pass any 1 of 7 tests)</div>
<div class="card card-mb">
  <div style="font-size:15px;font-weight:800;color:#0D1F3C;margin-bottom:8px;">Temp. Reg. §1.469-5T(a)</div>
  <div style="font-size:13px;color:#64748B;line-height:1.7;margin-bottom:14px;">Once a STR qualifies under the average period test, it is treated as a trade or business activity. The taxpayer must then materially participate to make losses non-passive. Pass any one of the seven tests below.</div>
  ${[['1','500 Hours','§1.469-5T(a)(1)','Participate more than 500 hours in the STR activity during the year. A spouse\'s hours count toward this test.','#D1FAE5','#065F46','Most straightforward but requires significant time commitment.'],['2','Substantially All','§1.469-5T(a)(2)','Your participation constitutes substantially all participation by all individuals. No one else (paid or unpaid) participated more than nominally.','#F0FDFA','#64748B','Difficult if you use a co-host, cleaner, or property manager.'],['3','100 Hrs + Primary','§1.469-5T(a)(3)','Participate more than 100 hours AND more than any other individual including paid staff. Most commonly used STR test.','#D1FAE5','#065F46','Most accessible test — keep your hours above your co-host or cleaner.'],['4','SPA Aggregate','§1.469-5T(a)(4)','Activity qualifies as significant participation (100–499 hrs) and all your SPAs aggregate to 500+ hours for the year.','#F0FDFA','#64748B','Useful when you have multiple STRs, each with 100–499 hrs.'],['5','5 of Last 10 Years','§1.469-5T(a)(5)','Materially participated in this activity in any 5 of the 10 immediately preceding taxable years. Need not be consecutive.','#F0FDFA','#64748B','Requires prior year documentation. Applies regardless of current year hours.'],['6','3 Prior Yrs (Service)','§1.469-5T(a)(6)','Materially participated in any 3 preceding years when the activity was a personal service activity.','#F0FDFA','#64748B','Does not apply to most STRs — rental properties are almost never personal service activities. More common for medical, law, engineering, or consulting businesses.'],['7','Facts & Circumstances','§1.469-5T(a)(7)','Participate on a regular, continuous, and substantial basis (facts & circumstances — Temp. Reg. §1.469-5T(a)(7)). Tax practitioners commonly treat 100+ hours as a practical minimum based on case law and examination experience, though no fixed threshold appears in the regulatory text.','#D1FAE5','#065F46','True facts-and-circumstances test. Document the frequency, duration, and nature of your involvement. 100+ hrs, being the primary participant, with no compensated manager is the widely applied practical standard.']].map(([n,l,c,d,bg,tc,tip])=>`
  <div style="display:flex;gap:14px;padding:14px 0;border-bottom:.5px solid #F0FDFA;align-items:flex-start;">
    <div style="width:42px;height:42px;border-radius:9px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:${tc};flex-shrink:0;border:.5px solid #CCFBF1;">${n}</div>
    <div style="flex:1;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
        <div style="font-size:13px;font-weight:700;color:#0D1F3C;">Test ${n} — ${l}</div>
        <span style="font-size:10px;color:#94A3B8;font-family:ui-monospace,monospace;padding:1px 6px;background:#F0FDFA;border-radius:4px;">${c}</span>
      </div>
      <div style="font-size:12px;color:#64748B;line-height:1.6;margin-bottom:4px;">${d}</div>
      <div style="font-size:11px;color:#0E7490;font-style:italic;">→ ${tip}</div>
    </div>
  </div>`).join('')}
</div>

<div class="sec-lbl">What hours qualify?</div>
<div class="card card-mb">
  <div style="font-size:13px;color:#64748B;line-height:1.7;margin-bottom:12px;">Any hour genuinely spent in active management and operation of the STR counts. Courts look for real participation — not passive ownership. Document every interaction with the date, duration, and specific activity.</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    ${['Guest communication & messaging','Booking & reservation management','Check-in / check-out coordination','Cleaning coordination & oversight','Listing creation & optimization','Maintenance & repair oversight','Furnishing & décor decisions','Pricing & revenue management','Financial reconciliation & accounting','Contractor coordination & scheduling','Property inspections','Travel to/from the STR property (active purpose)'].map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#F0FDFA;border-radius:8px;font-size:12px;color:#0D1F3C;"><span style="color:#14B8A6;font-weight:700;">✓</span>${a}</div>`).join('')}
  </div>
</div>

<div class="sec-lbl">Spouse Hours & the STR Material Participation Exception</div>
<div class="card card-mb">
  <div style="font-size:15px;font-weight:800;color:#0D1F3C;margin-bottom:8px;">Temp. Reg. §1.469-5T(f)(3)</div>
  <div style="font-size:13px;color:#64748B;line-height:1.7;margin-bottom:10px;">Spouse hours are treated differently in STR MP tests than in REPS qualification:</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <div style="padding:12px;background:#ECFDF5;border-radius:10px;border:.5px solid #6EE7B7;"><div style="font-size:12px;font-weight:700;color:#065F46;margin-bottom:6px;">✓ Spouse hours count for:</div><ul style="font-size:12px;color:#0D1F3C;line-height:1.9;padding-left:16px;"><li>Test 1 — combined toward 500 hr threshold</li><li>Tests 5 & 6 — prior year history tests</li></ul></div>
    <div style="padding:12px;background:#FEF2F2;border-radius:10px;border:.5px solid #FECACA;"><div style="font-size:12px;font-weight:700;color:#991B1B;margin-bottom:6px;">⚠ Spouse hours count against you for:</div><ul style="font-size:12px;color:#0D1F3C;line-height:1.9;padding-left:16px;"><li>Test 3 — "more than any other individual" includes spouse</li><li>Test 7 — same comparison requirement as Test 3</li></ul></div>
  </div>
</div>

<div class="sec-lbl">Top STR Audit Issues</div>
<div class="card">
  ${[['⛔','Average rental period not calculated','You must track each individual booking. Airbnb/VRBO summaries may not match the IRS calculation. Keep your own booking-level log.'],['⛔','Co-host or cleaner hours exceed yours','If a paid co-host or cleaning service logs more hours than you, Tests 3 and 7 both fail. Stay the primary participant.'],['⛔','No documentation of personal services (8–30 day avg)','For mid-range rentals, courts require evidence of specific services provided on specific dates — standard cleaning doesn\'t qualify.'],['⚠','Inconsistent treatment year to year','Treating an STR as passive one year then non-passive the next raises red flags. Pick a strategy and document it consistently.'],['⚠','Combining STR and LTR hours improperly','Each property is a separate activity unless a grouping election is filed. Hours cannot be freely mixed between properties.']].map(([ic,t,d])=>`<div style="display:flex;gap:12px;padding:12px 0;border-bottom:.5px solid #F0FDFA;align-items:flex-start;"><span style="font-size:18px;flex-shrink:0;">${ic}</span><div><div style="font-size:13px;font-weight:700;color:#0D1F3C;margin-bottom:3px;">${t}</div><div style="font-size:12px;color:#64748B;line-height:1.6;">${d}</div></div></div>`).join('')}

  }
}

let walkStep=0;

function showWalkthrough(){
  if(localStorage.getItem(WALK_KEY))return;
  const el=document.getElementById('walk-overlay');
  if(el){el.style.display='flex';renderWalkStep();}
}

function renderWalkStep(){
  const s=steps[walkStep];
  const total=steps.length;
  document.getElementById('walk-icon').textContent=s.icon;
  document.getElementById('walk-title').textContent=s.title;
  document.getElementById('walk-body').innerHTML=s.body;
  const tipEl=document.getElementById('walk-tip');
  if(s.tip){tipEl.style.display='block';tipEl.textContent=s.tip;}
  else{tipEl.style.display='none';}
  document.getElementById('walk-back').style.display=walkStep===0?'none':'inline-flex';
  const nextBtn=document.getElementById('walk-next');
  nextBtn.textContent=walkStep===total-1?'Start tracking →':'Next →';
  // dots
  const dots=document.getElementById('walk-dots');
  dots.innerHTML=steps.map((_,i)=>`<div style="width:8px;height:8px;border-radius:50%;background:${i===walkStep?'#14B8A6':'#1E4A6E'};transition:background .2s;"></div>`).join('');
}

function walkNext(){
  if(walkStep<steps.length-1){walkStep++;renderWalkStep();}
  else{closeWalkthrough();}
}
function walkBack(){if(walkStep>0){walkStep--;renderWalkStep();}}
function closeWalkthrough(){
  localStorage.setItem(WALK_KEY,'1');
  const el=document.getElementById('walk-overlay');
  if(el)el.style.display='none';
}

// Show after a short delay so the app loads first
setTimeout(showWalkthrough,800);
