<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Same strict CSP as login.html. Script logic lives in the external signup-auth.js ('self').
     Supabase loads from cdn.jsdelivr.net (pinned + SRI). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://ehuttijifubonhhgnvzx.supabase.co; connect-src 'self' https://ehuttijifubonhhgnvzx.supabase.co wss://ehuttijifubonhhgnvzx.supabase.co; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Create your account — RepsRecord</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#0D1F3C;color:#0D1F3C;display:flex;align-items:center;justify-content:center;padding:20px;min-height:100vh;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(20,184,166,.14) 0%,transparent 70%);pointer-events:none;}
.card{position:relative;background:#fff;border-radius:18px;width:100%;max-width:400px;padding:36px 32px 30px;box-shadow:0 30px 70px rgba(0,0,0,.45);}
.logo{font-size:24px;font-weight:900;color:#0D1F3C;letter-spacing:-0.04em;text-align:center;margin-bottom:4px;}
.logo span{color:#14B8A6;}
.sub{font-size:13px;color:#64748B;text-align:center;margin-bottom:26px;}
.welcome{background:#ECFDF5;border:1px solid #6EE7B7;border-radius:9px;padding:10px 12px;font-size:12.5px;line-height:1.5;color:#065F46;text-align:center;margin-bottom:20px;}
label.fl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748B;margin-bottom:6px;}
.field{margin-bottom:16px;}
.field input{width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid #CBD5E1;font-size:15px;font-family:inherit;color:#0D1F3C;background:#F8FAFC;outline:none;transition:border-color .15s,box-shadow .15s;}
.field input:focus{border-color:#14B8A6;box-shadow:0 0 0 3px rgba(20,184,166,.18);background:#fff;}
.hint{font-size:11px;color:#94A3B8;margin-top:5px;}
.btn{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:800;font-family:inherit;transition:opacity .15s,background .15s;}
.btn:disabled{opacity:.6;cursor:default;}
.btn-teal{background:#14B8A6;color:#fff;}
.btn-teal:hover:not(:disabled){background:#0D9488;}
.btn-google{background:#fff;color:#0D1F3C;border:1.5px solid #CBD5E1;display:flex;align-items:center;justify-content:center;gap:9px;}
.btn-google:hover{background:#F8FAFC;border-color:#94A3B8;}
.btn-google svg{width:18px;height:18px;flex-shrink:0;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#94A3B8;font-size:11px;font-weight:700;letter-spacing:.05em;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E2E8F0;}
#msg{display:none;font-size:13px;line-height:1.5;margin-bottom:16px;padding:10px 12px;border-radius:8px;background:#FEF2F2;border:1px solid #FECACA;}
.foot{text-align:center;font-size:12px;color:#64748B;margin-top:24px;line-height:1.7;}
.foot a{color:#14B8A6;font-weight:600;text-decoration:none;}
.foot a:hover{text-decoration:underline;}
</style>
</head>
<body>
  <div class="card" role="main">
    <div class="logo">REPS<span>Record</span></div>
    <div class="sub">Create your account</div>

    <div class="welcome">✓ Payment received — set a password to finish setting up your account.</div>

    <div id="msg" role="alert" aria-live="polite"></div>

    <div class="field">
      <label class="fl" for="email">Email</label>
      <input id="email" type="email" autocomplete="email" inputmode="email" placeholder="you@example.com"/>
    </div>
    <div class="field">
      <label class="fl" for="password">Create a password</label>
      <div style="position:relative;">
        <input id="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" style="width:100%;padding-right:44px;box-sizing:border-box;"/>
        <button type="button" id="pw-toggle" aria-label="Show password" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:4px;line-height:1;color:#64748b;">👁</button>
      </div>
      <div class="hint">Use 8 or more characters.</div>
    </div>

    <button id="signup-btn" class="btn btn-teal" type="button">Create account</button>

    <div class="divider">OR</div>

    <button id="google-btn" class="btn btn-google" type="button">
      <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.1-11.3-7.4l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.6l6.2 5.2C39.4 41.4 44 38 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
      Sign up with Google
    </button>

    <div class="foot">
      Already have an account? <a href="login.html">Sign in</a><br>
      Questions? <a href="mailto:support@repsrecord.com">support@repsrecord.com</a>
    </div>
  </div>

  <script src="signup-auth.js"></script>
  <script>
    (function(){
      var t=document.getElementById('pw-toggle'), p=document.getElementById('password');
      if(t&&p){ t.addEventListener('click',function(){
        var show=p.type==='password';
        p.type=show?'text':'password';
        t.textContent=show?'🙈':'👁';
        t.setAttribute('aria-label',show?'Hide password':'Show password');
        p.focus();
      }); }
    })();
  </script>
</body>
</html>
